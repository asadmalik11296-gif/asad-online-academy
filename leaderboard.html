<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKSSB Mock Test Leaderboard</title>
    
    <!-- 🖥️ GOOGLE ADSENSE CODE INTEGRATION -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-6086620349531765">

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .leaderboard-container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #007bff; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #6c757d; font-size: 14px; margin-bottom: 25px; }
        
        /* Leaderboard Table Styles */
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .rank-table th { background-color: #007bff; color: white; padding: 12px; text-align: left; font-size: 15px; }
        .rank-table td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 15px; color: #2d3748; }
        .rank-table tr:hover { background-color: #f8fafc; }
        
        /* Highlight Ranks */
        .rank-badge { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; font-weight: bold; font-size: 13px; }
        .rank-1 { background-color: #ffd700; color: #000; } /* Gold */
        .rank-2 { background-color: #c0c0c0; color: #000; } /* Silver */
        .rank-3 { background-color: #cd7f32; color: #white; } /* Bronze */
        .score-val { font-weight: bold; color: #28a745; text-align: right; }
        
        .loading { text-align: center; color: #a0aec0; padding: 20px; font-style: italic; }
        .adsense-placement { margin: 20px auto; padding: 10px; background: #fafafa; border: 1px dashed #ccc; text-align: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<div class="leaderboard-container">
    <h2>🏆 JKSSB Exam Hall of Fame</h2>
    <div class="subtitle">Live Top 10 Student Rankings</div>

    <!-- Ad placeholder box for monetization -->
    <div class="adsense-placement">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6086620349531765" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="loading-view" class="loading">Fetching live test records...</div>

    <table class="rank-table id="leaderboard-table" style="display:none;">
        <thead>
            <tr>
                <th style="width: 15%;">Rank</th>
                <th style="width: 55%;">Student Name</th>
                <th style="width: 30%; text-align: right;">Score</th>
            </tr>
        </thead>
        <tbody id="leaderboard-rows">
            <!-- Dynamic student entries inject here -->
        </tbody>
    </table>
</div>

<script>
// ⚠️ PASTE YOUR COPIED GOOGLE SHEET ID STRING BETWEEN THE QUOTES BELOW
const SHEET_ID = 'YOUR_GOOGLE_SHEET_ID_HERE';
const SHEET_NAME = 'Form Responses 1'; // Default sheet name generated by Google Forms

async function fetchAndRenderLeaderboard() {
    // Uses Google's CSV export mechanism to cleanly fetch sheet contents without access tokens
    const dataUrl = `https://google.com{SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
    
    try {
        const response = await fetch(dataUrl);
        const textData = await response.text();
        
        // Parse CSV rows cleanly
        const parsedRows = parseCSV(textData);
        
        // Map data records (Assuming Timestamp is Column 0, Name is Column 1, Score is Column 2)
        let studentsList = parsedRows.slice(1).map(row => {
            return {
                name: row[1] ? row[1].replace(/"/g, '') : 'Anonymous',
                score: row[2] ? parseFloat(row[2].replace(/"/g, '')) : 0.00
            };
        });

        // Sort students list based on highest calculated score thresholds
        studentsList.sort((a, b) => b.score - a.score);

        // Slice array down to retain strictly the Top 10 high-achievers
        const topTen = studentsList.slice(0, 10);

        renderTableUi(topTen);
    } catch (error) {
        console.error("Error reading spreadsheet matrix rows:", error);
        document.getElementById("loading-view").innerText = "Failed to sync leaderboard. Refreshing page...";
    }
}

function parseCSV(text) {
    let lines = text.split('\n');
    return lines.map(line => {
        // Splitting logic keeping cell strings context boundaries
        return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    });
}

function renderTableUi(records) {
    document.getElementById("loading-view").style.display = "none";
    const tableElement = document.getElementById("leaderboard-table");
    const container = document.getElementById("leaderboard-rows");
    
    if (records.length === 0) {
        document.getElementById("loading-view").style.display = "block";
        document.getElementById("loading-view").innerText = "No student test submittals recorded yet.";
        return;
    }

    container.innerHTML = records.map((student, index) => {
        const rank = index + 1;
        let badgeClass = "rank-badge";
        if (rank <= 3) badgeClass += ` rank-${rank}`;

        return `
            <tr>
                <td><span class="${badgeClass}">${rank}</span></td>
                <td style="font-weight: 500;">${student.name}</td>
                <td class="score-val">${student.score.toFixed(2)}</td>
            </tr>
        `;
    }).join('');

    tableElement.style.display = "table";
}

window.onload = fetchAndRenderLeaderboard;
</script>
</body>
</html>
